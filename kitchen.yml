---
driver:
  name: vagrant

provisioner:
  name: chef_infra
  product_name: chef
  product_version: <%= ENV['CHEF_VERSION'] || 'latest' %>
  channel: stable
  install_strategy: once
  chef_license: accept
  enforce_idempotency: <%= ENV['ENFORCE_IDEMPOTENCY'] || true %>
  multiple_converge: <%= ENV['MULTIPLE_CONVERGE'] || 2 %>
  deprecations_as_errors: true

verifier:
  name: inspec

platforms:
  - name: almalinux-9
  - name: debian-11
  - name: rockylinux-9
  - name: ubuntu-22.04

x-run_lists:
  default: &default_run_list
    - recipe[test::default]
  papertrail: &papertrail_run_list
    - recipe[test::papertrail]
  syslog: &syslog_run_list
    - recipe[test::syslog]

x-verifiers:
  default: &default_verifier
    inspec_tests:
      - path: test/integration/default
  papertrail: &papertrail_verifier
    inspec_tests:
      - path: test/integration/papertrail
  syslog: &syslog_verifier
    inspec_tests:
      - path: test/integration/syslog

suites:
  - name: default
    run_list: *default_run_list
    verifier: *default_verifier

  - name: papertrail
    run_list: *papertrail_run_list
    verifier: *papertrail_verifier

  - name: syslog
    run_list: *syslog_run_list
    verifier: *syslog_verifier
